<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Campus | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="bg-image"></div>
    
    <div class="app-container">
        <header>
            <div class="logo">
                <h1>Smart CAMPUS</h1>
            </div>
            <div class="nav-controls">
                <button class="btn-primary" onclick="showAddRoomModal()">
                    <i class="fas fa-plus"></i> Add Room
                </button>
                <button class="btn-primary" onclick="refreshData()">
                    <i class="fas fa-rotate"></i> Refresh
                </button>
            </div>
        </header>

        <main class="dashboard-grid">
            <!-- Left Side: Rooms List -->
            <section class="card">
                <div class="card-title">
                    <i class="fas fa-building"></i>
                    <h2>Campus Rooms</h2>
                </div>
                <div id="roomList" class="room-list">
                    <!-- Rooms will be injected here -->
                    <div class="loader">Loading campus assets...</div>
                </div>
            </section>

            <!-- Right Side: Selected Room Sensors -->
            <section class="card">
                <div class="card-title">
                    <i class="fas fa-microchip"></i>
                    <h2 id="sensorTitle">Sensors</h2>
                </div>
                <div id="sensorList" class="sensor-detail-pane">
                    <div class="empty-state">
                        <p>Select a room to view sensor data</p>
                    </div>
                </div>
                <div id="sensorControls" style="margin-top: auto; padding-top: 2rem; display: none;">
                    <button class="btn-primary" style="width: 100%" onclick="showAddSensorModal()">
                        <i class="fas fa-plus-circle"></i> Add Sensor
                    </button>
                </div>
            </section>
        </main>
    </div>

    <!-- Modal for Adding Room -->
    <div id="roomModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom: 2rem;">Add New Room</h2>
            <form id="roomForm">
                <div class="form-group">
                    <label>Room ID (e.g., LIB-101)</label>
                    <input type="text" id="newRoomId" placeholder="ID" required>
                </div>
                <div class="form-group">
                    <label>Room Name</label>
                    <input type="text" id="newRoomName" placeholder="Name" required>
                </div>
                <div class="form-group">
                    <label>Capacity</label>
                    <input type="number" id="newRoomCapacity" placeholder="Capacity" required>
                </div>
                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" class="btn-primary" style="flex: 1;">Create</button>
                    <button type="button" class="btn-primary" style="flex: 1; background: #333;" onclick="hideModals()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal for Adding Sensor -->
    <div id="sensorModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom: 2rem;">Register Sensor</h2>
            <form id="sensorForm">
                <div class="form-group">
                    <label>Sensor ID</label>
                    <input type="text" id="newSensorId" placeholder="ID" required>
                </div>
                <div class="form-group">
                    <label>Type</label>
                    <select id="newSensorType">
                        <option value="Temperature">Temperature</option>
                        <option value="Humidity">Humidity</option>
                        <option value="CO2">CO2</option>
                        <option value="Occupancy">Occupancy</option>
                        <option value="Light">Light</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Initial Value</label>
                    <input type="number" step="0.1" id="newSensorValue" placeholder="0.0" required>
                </div>
                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" class="btn-primary" style="flex: 1;">Register</button>
                    <button type="button" class="btn-primary" style="flex: 1; background: #333;" onclick="hideModals()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
